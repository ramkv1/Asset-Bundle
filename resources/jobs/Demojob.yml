resources:
  jobs:
    Demojob:
      name: Demojob
      tasks:
        - task_key: Notebook_Job
          notebook_task:
            notebook_path: ../../src/notebooks/Notebook_Job.ipynb
            source: GITHUB
          environment_key: Notebook_Job_environment
      queue:
        enabled: true
      environments:
        - environment_key: Notebook_Job_environment
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
